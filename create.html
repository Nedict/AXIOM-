<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM | Forge Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6 md:p-12">

    <div class="max-w-2xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white">Forge New Schematic</h1>
                <p class="text-slate-500 text-sm">Commit system structures to cloud storage sync clusters</p>
            </div>
            <a href="index.html" class="text-slate-400 hover:text-white text-sm font-medium transition-colors">&larr; Dashboard</a>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Schematic Module Name</label>
                <input type="text" id="title" required placeholder="e.g., Mobile Flood Detection Node" class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-blue-500 text-sm transition-colors">
            </div>

            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-2">Technical Core Description</label>
                <textarea id="description" rows="5" required placeholder="Outline layout operational thresholds, system wiring parameters, or structural features..." class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-blue-500 text-sm transition-colors resize-none"></textarea>
            </div>

            <button type="submit" id="publish-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-sm transition-all shadow-lg shadow-blue-600/20">
                Publish Node
            </button>
        </form>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        document.addEventListener('DOMContentLoaded', () => {
            const publishBtn = document.getElementById('publish-btn');
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');

            if (publishBtn) {
                publishBtn.addEventListener('click', async (e) => {
                    e.preventDefault();

                    const title = titleInput.value.trim();
                    const description = descInput.value.trim();

                    if (!title) {
                        alert("Validation Error: Title property cannot be null.");
                        return;
                    }

                    publishBtn.innerText = "Forging Data Nodes...";
                    publishBtn.disabled = true;

                    try {
                        const { error } = await supabase
                            .from('projects')
                            .insert([{ title, description }]);

                        if (error) throw error;

                        window.location.href = 'index.html';
                    } catch (err) {
                        alert("Cloud Commit Blocked: " + err.message);
                        publishBtn.innerText = "Publish Node";
                        publishBtn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>
</html>
