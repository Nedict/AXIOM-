<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM Engineering</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <nav class="p-6 border-b border-slate-800">
        <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">AXIOM</h1>
    </nav>

    <main id="app-root" class="p-6">
        <!-- The JS will inject the dashboard here -->
        <div class="animate-pulse space-y-4">
            <div class="h-4 bg-slate-800 rounded w-1/3"></div>
            <div class="h-32 bg-slate-900 rounded"></div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full p-4 text-center text-slate-600 text-sm">
        &copy; 2026 AXIOM Engineering
    </footer>

    <!-- Essential: type="module" allows the browser to run our import statements -->
    <script type="module" src="app.js"></script>
</body>
</html>
