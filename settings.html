<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM - Control Center & Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="db.js"></script>
</head>
<body class="font-sans antialiased min-h-screen bg-[#030712] text-[#f3f4f6] pb-12">

    <nav class="sticky top-0 z-50 bg-gray-900/70 backdrop-blur-xl border-b border-gray-800 px-6 py-4 flex justify-between items-center mb-8">
        <div class="flex items-center space-x-3">
            <a href="feed.html" class="text-gray-400 hover:text-white transition text-sm">← Back to Feed</a>
            <span class="text-gray-600">|</span>
            <span class="text-base font-bold tracking-wider text-white">AXIOM PANEL</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-12 gap-6">
        <aside class="md:col-span-4 space-y-2">
            <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-xs font-mono space-y-1">
                <span class="text-[10px] font-bold text-gray-500 uppercase block mb-2 px-2">Configuration Blocks</span>
                <a href="#feed-preferences" class="block px-3 py-2 rounded-lg bg-gray-950 text-cyan-400 border border-gray-800">Engineering Feed Routing</a>
            </div>
        </aside>

        <section class="md:col-span-8 space-y-6">
            <div id="feed-preferences" class="bg-gray-900/50 border border-cyan-500/20 rounded-xl p-6 space-y-4">
                <div>
                    <h2 class="text-sm font-bold text-white tracking-wide">Engineering Feed Preferences</h2>
                    <p class="text-[11px] text-gray-400 mt-1">AXIOM Stream-Isolation Core. Filter your workspace timeline view to lock down relevant technical updates.</p>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 pt-2 text-xs">
                    <div class="flex items-center space-x-2 border border-gray-800 bg-gray-950 p-2.5 rounded-lg">
                        <input type="checkbox" id="t-elec" checked class="rounded bg-black border-gray-800 text-cyan-400 focus:ring-0"><label for="t-elec">Electrical</label>
                    </div>
                    <div class="flex items-center space-x-2 border border-gray-800 bg-gray-950 p-2.5 rounded-lg">
                        <input type="checkbox" id="t-mech" class="rounded bg-black border-gray-800 text-cyan-400 focus:ring-0"><label for="t-mech">Mechanical</label>
                    </div>
                    <div class="flex items-center space-x-2 border border-gray-800 bg-gray-950 p-2.5 rounded-lg">
                        <input type="checkbox" id="t-tron" checked class="rounded bg-black border-gray-800 text-cyan-400 focus:ring-0"><label for="t-tron">Mechatronics</label>
                    </div>
                    <div class="flex items-center space-x-2 border border-gray-800 bg-gray-950 p-2.5 rounded-lg">
                        <input type="checkbox" id="t-renew" checked class="rounded bg-black border-gray-800 text-cyan-400 focus:ring-0"><label for="t-renew">Renewable Energy</label>
                    </div>
                    <div class="flex items-center space-x-2 border border-gray-800 bg-gray-950 p-2.5 rounded-lg">
                        <input type="checkbox" id="t-ai" checked class="rounded bg-black border-gray-800 text-cyan-400 focus:ring-0"><label for="t-ai">AI Engineering</label>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>
  </html>
