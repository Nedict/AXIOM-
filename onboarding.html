<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOM | Access Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md p-8 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">AXIOM</h1>
            <p class="text-slate-400 text-sm mt-1">Authentication Protocol Required</p>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1">Email Terminal Address</label>
                <input type="email" id="email" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-blue-500 font-mono text-sm transition-colors">
            </div>

            <div>
                <label class="block text-xs font-mono uppercase tracking-wider text-slate-400 mb-1">Security Passkey</label>
                <input type="password" id="password" required class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-blue-500 font-mono text-sm transition-colors">
            </div>

            <div class="pt-2 grid grid-cols-2 gap-4">
                <button type="button" id="login-btn" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg text-sm transition-all shadow-lg shadow-blue-600/10">
                    Sign In
                </button>
                <button type="button" id="signup-btn" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold rounded-lg text-sm transition-all border border-slate-700">
                    Sign Up
                </button>
            </div>
        </form>

        <div id="status-box" class="hidden p-4 rounded-lg text-xs font-mono text-center"></div>
    </div>

    <script type="module">
        import { supabase } from './supabaseClient.js';

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const signupBtn = document.getElementById('signup-btn');
        const statusBox = document.getElementById('status-box');

        function showMessage(msg, isError = false) {
            statusBox.classList.remove('hidden', 'bg-red-900/20', 'text-red-400', 'bg-green-900/20', 'text-green-400');
            statusBox.classList.add(isError ? 'bg-red-900/20' : 'bg-green-900/20');
            statusBox.classList.add(isError ? 'text-red-400' : 'text-green-400');
            statusBox.innerText = msg;
        }

        // --- SIGN UP INTERACTION ---
        signupBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showMessage("Email and password credentials are blank.", true);
                return;
            }

            signupBtn.innerText = "Registering...";
            signupBtn.disabled = true;

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                showMessage(error.message, true);
                signupBtn.innerText = "Sign Up";
                signupBtn.disabled = false;
            } else {
                showMessage("Account generated! If confirmation email is required, verify your inbox. Otherwise, proceed to Sign In.");
                signupBtn.innerText = "Sign Up";
                signupBtn.disabled = false;
            }
        });

        // --- LOGIN INTERACTION ---
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showMessage("Credentials cannot be empty.", true);
                return;
            }

            loginBtn.innerText = "Authenticating...";
            loginBtn.disabled = true;

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage(error.message, true);
                loginBtn.innerText = "Sign In";
                loginBtn.disabled = false;
            } else {
                showMessage("Access Granted. Redirecting...");
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
